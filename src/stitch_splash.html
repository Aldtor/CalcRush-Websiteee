<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CalcRush - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>

            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .neon-glow-primary {
            filter: drop-shadow(0 0 15px rgba(232, 179, 255, 0.6));
        }
        .neon-glow-icon {
            box-shadow: 0 0 40px rgba(201, 96, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#4b3f71",
                        "surface-variant": "#3b323d",
                        "on-surface-variant": "#d3c1d6",
                        "on-primary-fixed": "#310049",
                        "error-container": "#93000a",
                        "inverse-on-surface": "#362d39",
                        "inverse-surface": "#eddeed",
                        "surface-bright": "#3f3642",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#460066",
                        "secondary-fixed": "#e9ddff",
                        "surface-container-highest": "#3b323d",
                        "tertiary-container": "#9689c0",
                        "on-secondary-fixed": "#23005b",
                        "on-primary-fixed-variant": "#7200a3",
                        "primary": "#e8b3ff",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#5700c9",
                        "surface-tint": "#e8b3ff",
                        "surface": "#18111b",
                        "primary-fixed": "#f6d9ff",
                        "tertiary-fixed-dim": "#cdbef9",
                        "tertiary-fixed": "#e8ddff",
                        "on-primary": "#500074",
                        "secondary": "#d1bcff",
                        "inverse-primary": "#9600d4",
                        "surface-container-lowest": "#130c16",
                        "surface-dim": "#18111b",
                        "on-secondary": "#3c0090",
                        "outline-variant": "#4f4254",
                        "secondary-container": "#7000ff",
                        "on-tertiary": "#342859",
                        "outline": "#9c8ba0",

                        "stack-lg": "32px",
                        "container-padding": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Nunito"],
                        "stats-num": ["Nunito"],
                        "body-md": ["Lexend"],
                        "headline-lg": ["Nunito"],
                        "body-lg": ["Lexend"],
                        "label-bold": ["Lexend"],
                        "display-xl": ["Nunito"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "800" }],

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest min-h-screen w-full relative overflow-hidden flex flex-col items-center justify-center">
<!-- Cosmic Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<!-- Radial Gradients -->
<div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[70vw] h-[70vw] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute top-[30%] left-[40%] w-[40vw] h-[40vw] rounded-full bg-tertiary-container/10 blur-[80px]"></div>
<!-- Floating Glass Orbs -->
<div class="absolute top-[15%] right-[15%] w-[80px] h-[80px] rounded-full bg-surface-variant/20 backdrop-blur-xl border border-outline-variant/30 shadow-lg"></div>
<div class="absolute bottom-[25%] left-[10%] w-[120px] h-[120px] rounded-full bg-inverse-surface/5 backdrop-blur-2xl border border-outline-variant/20 shadow-xl"></div>
<div class="absolute top-[50%] right-[5%] w-[40px] h-[40px] rounded-full bg-primary/10 backdrop-blur-md border border-primary/20"></div>
<!-- Subtle Stars / Particles -->
<div class="absolute top-[20%] left-[30%] w-1 h-1 rounded-full bg-primary-fixed-dim/80"></div>
<div class="absolute top-[40%] right-[30%] w-[2px] h-[2px] rounded-full bg-secondary-fixed/90"></div>
<div class="absolute bottom-[30%] left-[40%] w-1.5 h-1.5 rounded-full bg-tertiary-fixed-dim/70"></div>
<div class="absolute bottom-[10%] right-[40%] w-1 h-1 rounded-full bg-primary-fixed/60"></div>
</div>
<!-- Main Content Center -->
<main class="z-10 flex flex-col items-center text-center space-y-stack-lg px-container-padding">
<!-- App Icon -->
<div class="relative w-[140px] h-[140px] rounded-[32px] bg-gradient-to-br from-primary-container to-secondary-container flex items-center justify-center neon-glow-icon border border-white/20">
<!-- Icon Background Pattern Overlay (Subtle) -->
<div class="absolute inset-0 rounded-[32px] bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjE1KSIvPjwvc3ZnPg==')] opacity-50 mix-blend-overlay"></div>
<div class="relative flex items-center justify-center w-full h-full">
<!-- Sigma Symbol -->
<span class="absolute font-display-xl text-display-xl text-primary-fixed/40 transform -translate-x-3 translate-y-2 pointer-events-none" style="font-size: 80px;">∑</span>
<!-- Lightning Bolt -->
<span class="material-symbols-outlined text-on-primary-fixed font-bold z-10" style="font-size: 72px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));">bolt</span>
</div>
</div>
<!-- Typography -->
<div class="flex flex-col items-center space-y-stack-sm">
<h1 class="font-display-xl text-display-xl text-on-surface neon-glow-primary tracking-tight">
                CalcRush
            </h1>
<p class="font-body-lg text-body-lg text-tertiary-fixed-dim opacity-90">
                Master Math. Beat the Clock.
            </p>
</div>
</main>
<!-- Bottom Margin Content -->
<footer class="absolute bottom-10 z-10 flex flex-col items-center space-y-stack-md">
<!-- Animated Loading Dots (Simulated State) -->
<div class="flex space-x-2 items-center h-[24px]">
<div class="w-2.5 h-2.5 rounded-full bg-primary neon-glow-primary opacity-100 transform scale-110"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-60"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-30"></div>
</div>
<!-- Version Label -->
<span class="font-label-bold text-label-bold text-outline uppercase tracking-widest">
            v1.0
        </span>
</footer>
</body></html>
