<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quantum Math - Result Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&amp;family=Nunito:wght@800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#4f4254",
                        "on-tertiary": "#342859",
                        "on-secondary": "#3c0090",
                        "on-background": "#eddeed",
                        "tertiary-fixed-dim": "#cdbef9",
                        "surface-container-lowest": "#130c16",
                        "on-secondary-container": "#ddcdff",
                        "inverse-primary": "#9600d4",
                        "on-primary-container": "#460066",
                        "tertiary-container": "#9689c0",
                        "surface-tint": "#e8b3ff",
                        "secondary-container": "#7000ff",
                        "on-primary": "#500074",
                        "on-surface": "#eddeed",
                        "on-tertiary-fixed-variant": "#4b3f71",
                        "on-primary-fixed-variant": "#7200a3",
                        "on-secondary-fixed": "#23005b",
                        "tertiary-fixed": "#e8ddff",
                        "inverse-on-surface": "#362d39",
                        "on-primary-fixed": "#310049",
                        "on-surface-variant": "#d3c1d6",
                        "on-tertiary-container": "#2d2151",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#d1bcff",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "tertiary": "#cdbef9",
                        "background": "#18111b",
                        "primary-fixed-dim": "#e8b3ff",
                        "error-container": "#93000a",
                        "surface-container-low": "#211923",
                        "on-secondary-fixed-variant": "#5700c9",
                        "on-tertiary-fixed": "#1f1242",
                        "surface-dim": "#18111b",
                        "primary-fixed": "#f6d9ff",
                        "secondary-fixed": "#e9ddff",
                        "surface-bright": "#3f3642",
                        "outline": "#9c8ba0",
                        "surface-container": "#251d28",
                        "surface": "#18111b",
                        "secondary": "#d1bcff",
                        "primary": "#e8b3ff",
                        "surface-container-high": "#2f2732",
                        "surface-variant": "#3b323d",
                        "surface-container-highest": "#3b323d",
                        "primary-container": "#c960ff",
                        "inverse-surface": "#eddeed"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "unit": "8px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "container-padding": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "stats-num": ["Nunito"],
                        "label-bold": ["Lexend"],
                        "headline-md": ["Nunito"],
                        "body-lg": ["Lexend"],
                        "body-md": ["Lexend"],
                        "headline-lg": ["Nunito"],
                        "display-xl": ["Nunito"]
                    },
                    "fontSize": {
                        "stats-num": ["40px", {"lineHeight": "40px", "fontWeight": "900"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "900"}],
                        "display-xl": ["48px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "900"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(191, 64, 255, 0.4), inset 0 0 10px rgba(191, 64, 255, 0.2);
        }
        .neon-text-primary {
            text-shadow: 0 0 10px rgba(232, 179, 255, 0.8);
        }
        .bg-cosmic {
            background-color: #18111b;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(150, 0, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 50%);
        }
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(191,64,255,0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-cosmic text-on-surface min-h-screen font-body-md relative pb-stack-lg pt-24 md:pt-24 flex flex-col items-center">
<!-- TopAppBar (Suppressed as this is a linear/transactional success screen, but keeping a simplified header per JSON if forced, though instructions suggest suppressing. I will suppress the full TopAppBar and BottomNavBar to focus on the result canvas.) -->
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-container-padding flex flex-col gap-stack-lg flex-grow z-10">
<!-- 1. HERO Section -->
<section class="flex flex-col items-center text-center gap-stack-sm pt-stack-md">
<div class="text-6xl mb-2 drop-shadow-[0_0_15px_rgba(255,215,0,0.5)]">🏆</div>
<h1 class="font-headline-lg text-headline-lg text-white">Excellent! ⭐</h1>
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-gradient-to-r from-amber-500/20 to-orange-500/20 border border-amber-500/30 text-amber-400 font-label-bold text-label-bold shadow-[0_0_15px_rgba(245,158,11,0.2)]">
<span class="material-symbols-outlined text-[16px]">celebration</span>
                New Personal Best!
            </div>
</section>
<!-- 2. ACCURACY RING -->
<section class="flex flex-col items-center justify-center relative">
<div class="relative w-[160px] h-[160px] flex items-center justify-center">
<!-- SVG Donut -->
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Background Track -->
<circle cx="50" cy="50" fill="transparent" r="40" stroke="rgba(255,255,255,0.1)" stroke-linecap="round" stroke-width="8"></circle>
<!-- Progress Arc (82% of 251.2 circumference = 205.98) -->
<defs>
<lineargradient id="ringGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#BF40FF"></stop>
<stop offset="100%" stop-color="#00D2FF"></stop>
</lineargradient>
</defs>
<circle cx="50" cy="50" fill="transparent" r="40" stroke="url(#ringGradient)" stroke-dasharray="251.2" stroke-dashoffset="45.216" stroke-linecap="round" stroke-width="8" style="filter: drop-shadow(0 0 8px rgba(191,64,255,0.6));"></circle>
</svg>
<!-- Center Text -->
<div class="absolute flex flex-col items-center justify-center">
<span class="font-display-xl text-display-xl text-white tracking-tighter">82<span class="text-2xl">%</span></span>
</div>
</div>
<p class="mt-4 font-label-bold text-label-bold text-outline uppercase tracking-widest">ACCURACY</p>
</section>
<!-- 3. SCORE CARD -->
<section class="glass-card rounded-2xl p-6 flex flex-row items-center justify-between gap-6 relative overflow-hidden">
<!-- Decorative blur blob -->
<div class="absolute -top-10 -left-10 w-32 h-32 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="flex flex-col z-10">
<span class="font-label-bold text-label-bold text-outline uppercase">Score</span>
<span class="font-stats-num text-[56px] leading-[56px] font-black text-primary neon-text-primary mt-1">34</span>
</div>
<div class="grid grid-cols-2 gap-x-6 gap-y-4 z-10 border-l border-white/10 pl-6">
<div class="flex flex-col">
<span class="text-[12px] text-outline uppercase tracking-wider font-semibold">Correct</span>
<span class="font-body-lg text-body-lg text-emerald-400 font-bold">16</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] text-outline uppercase tracking-wider font-semibold">Wrong</span>
<span class="font-body-lg text-body-lg text-error font-bold">4</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] text-outline uppercase tracking-wider font-semibold">Total</span>
<span class="font-body-lg text-body-lg text-white font-bold">20</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] text-outline uppercase tracking-wider font-semibold">Time</span>
<span class="font-body-lg text-body-lg text-white font-bold">43s</span>
</div>
</div>
</section>
<!-- 4. SESSION TAGS -->
<section class="flex flex-row flex-wrap justify-center gap-3">
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 border-white/10">
<span class="text-lg leading-none">⚡</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">Speed 60s</span>
</div>
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 border-white/10">
<span class="text-primary font-bold text-lg leading-none">×</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">Multiply</span>
</div>
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 border-white/10">
<span class="text-amber-400 text-sm leading-none">🟡</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">Medium</span>
</div>
</section>
<!-- 5. STREAK -->
<section class="glass-card rounded-xl p-4 flex flex-row items-center gap-4 border border-amber-500/20 bg-amber-500/5 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-transparent opacity-50"></div>
<div class="text-3xl drop-shadow-[0_0_10px_rgba(245,158,11,0.8)] z-10">🔥</div>
<div class="flex flex-col z-10">
<h3 class="font-headline-md text-headline-md text-amber-400 text-[20px] leading-tight">Best Streak: 7</h3>
<p class="font-body-md text-[14px] text-amber-100/70">Keep the fire burning!</p>
</div>
</section>
<!-- 6. ALL-TIME STATS -->
<section class="grid grid-cols-3 gap-3">
<div class="glass-card rounded-xl p-4 flex flex-col items-center justify-center text-center gap-1 border-white/5 hover:bg-white/10 transition-colors">
<span class="text-[11px] text-outline uppercase tracking-widest font-bold">Total Solved</span>
<span class="font-headline-md text-headline-md text-white">247</span>
</div>
<div class="glass-card rounded-xl p-4 flex flex-col items-center justify-center text-center gap-1 border-white/5 hover:bg-white/10 transition-colors">
<span class="text-[11px] text-outline uppercase tracking-widest font-bold">Avg Acc.</span>
<span class="font-headline-md text-headline-md text-white">79%</span>
</div>
<div class="glass-card rounded-xl p-4 flex flex-col items-center justify-center text-center gap-1 border-white/5 hover:bg-white/10 transition-colors">
<span class="text-[11px] text-outline uppercase tracking-widest font-bold">Best Score</span>
<span class="font-headline-md text-headline-md text-primary">34</span>
</div>
</section>
<!-- 7. BUTTONS -->
<section class="flex flex-col gap-4 mt-4">
<button class="w-full py-4 rounded-xl font-label-bold text-label-bold text-white bg-gradient-to-r from-secondary-container to-inverse-primary neon-glow flex items-center justify-center gap-2 hover:scale-[0.98] active:scale-95 transition-all">
<span class="material-symbols-outlined">refresh</span>
                PLAY AGAIN
            </button>
<button class="w-full py-4 rounded-xl font-label-bold text-label-bold text-on-surface-variant border border-outline-variant hover:bg-white/5 active:bg-white/10 flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">home</span>
                HOME
            </button>
</section>
</main>
</body></html>
